<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SanagClaw Prototype</title>
  <style>
    :root {
      --bg: #f6f5f2;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-2: #ffffff;
      --ink: #20262d;
      --muted: #76808a;
      --line: rgba(32, 38, 45, 0.08);
      --brand: #146a90;
      --brand-soft: #e4f3fb;
      --warm: #f6efe3;
      --warn: #af6d11;
      --warn-soft: #f8edd8;
      --success: #2b7a4b;
      --success-soft: #dff2e6;
      --danger: #b1453c;
      --danger-soft: #f8e0dc;
      --shadow: 0 18px 40px rgba(31, 45, 58, 0.12);
      --font: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(20, 106, 144, 0.12), transparent 28%),
        linear-gradient(180deg, #fbfaf7 0%, #f1efe9 100%);
    }

    .phone {
      width: 390px;
      min-height: 844px;
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      background: linear-gradient(180deg, #fbfaf7 0%, #f4f2ed 100%);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
    }

    .sidebar {
      position: absolute;
      inset: 0 auto 0 0;
      width: 306px;
      padding: 18px 14px 18px;
      background: rgba(250, 249, 246, 0.98);
      border-right: 1px solid rgba(32, 38, 45, 0.06);
      transform: translateX(-100%);
      transition: transform .28s ease;
      z-index: 20;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      backdrop-filter: blur(18px);
    }

    .sidebar.open { transform: translateX(0); }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(21, 27, 34, 0.24);
      opacity: 0;
      pointer-events: none;
      transition: opacity .24s ease;
      z-index: 15;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px 8px;
    }

    .topbar-left, .topbar-right, .row, .split, .chips, .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .icon-btn, .chip-btn, .composer-btn, .mini-btn {
      border: 0;
      font: inherit;
      cursor: pointer;
      transition: .2s ease;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: transparent;
      color: var(--ink);
      font-size: 18px;
    }

    .title-wrap strong {
      display: block;
      font-size: 18px;
      font-weight: 700;
    }

    .title-wrap span {
      color: var(--muted);
      font-size: 12px;
    }

    .chat-shell {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
    }

    .settings-page {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #fbfaf7 0%, #f4f2ed 100%);
      z-index: 18;
      display: none;
      grid-template-rows: auto 1fr;
    }

    .settings-page.open { display: grid; }

    .detail-page, .memory-page {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #fbfaf7 0%, #f4f2ed 100%);
      z-index: 17;
      display: none;
      grid-template-rows: auto 1fr;
    }

    .detail-page.open, .memory-page.open { display: grid; }

    .settings-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(32, 38, 45, 0.06);
      background: rgba(251, 250, 247, 0.92);
      backdrop-filter: blur(16px);
    }

    .settings-body {
      overflow: auto;
      padding: 14px 16px 22px;
      display: grid;
      gap: 14px;
    }

    .detail-body, .memory-body {
      overflow: auto;
      padding: 14px 16px 22px;
      display: grid;
      gap: 14px;
    }

    .intro {
      padding: 6px 18px 4px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      font-size: 34px;
      background: linear-gradient(180deg, #ff8f69, #ff6f5c);
      box-shadow: 0 10px 20px rgba(255, 111, 92, 0.24);
      margin-bottom: 12px;
    }

    .intro h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0.2px;
    }

    .intro p {
      margin: 10px 0 0;
      font-size: 15px;
      line-height: 1.65;
      color: #2f3a42;
    }

    .intro a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 600;
    }

    .promo {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 0;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 13px;
      font-weight: 600;
      font: inherit;
      cursor: pointer;
    }

    .message-area {
      overflow: auto;
      padding: 12px 18px 14px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .quick-entry, .message, .confirm-card, .sidebar-card, .history-item, .settings-card, .channel-item, .skill-item {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 10px 24px rgba(52, 63, 73, 0.06);
    }

    .quick-entry {
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.45;
      width: fit-content;
      max-width: 92%;
      cursor: pointer;
    }

    .message {
      max-width: 90%;
      padding: 14px 15px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 14px;
    }

    .message.user {
      justify-self: end;
      background: #eaf5fb;
      border-color: rgba(20, 106, 144, 0.08);
    }

    .message.assistant {
      justify-self: start;
      background: rgba(255, 255, 255, 0.86);
    }

    .message small, .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .composer-wrap {
      padding: 6px 14px 18px;
      background: linear-gradient(180deg, rgba(244, 242, 237, 0), rgba(244, 242, 237, 0.96) 16%);
    }

    .composer-module {
      margin: 0 14px 8px;
      padding: 12px 12px 10px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(32, 38, 45, 0.06);
      box-shadow: 0 10px 24px rgba(52, 63, 73, 0.06);
      overflow-x: auto;
    }

    .composer-module-tabs {
      display: flex;
      gap: 10px;
      width: max-content;
    }

    .composer-module-chip {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(32, 38, 45, 0.08);
      background: rgba(248, 248, 245, 0.95);
      color: #49515a;
      font-size: 14px;
      line-height: 1;
    }

    .composer-module-chip.active {
      border-color: rgba(20, 106, 144, 0.32);
      background: #ffffff;
      color: var(--brand);
      box-shadow: inset 0 0 0 1px rgba(20, 106, 144, 0.18);
    }

    .composer-module-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      color: var(--brand);
      font-size: 12px;
      background: rgba(20, 106, 144, 0.08);
    }

    .composer {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(32, 38, 45, 0.08);
      box-shadow: 0 10px 24px rgba(52, 63, 73, 0.08);
    }

    textarea {
      flex: 1;
      min-height: 24px;
      max-height: 120px;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      font: inherit;
      color: var(--ink);
      line-height: 1.5;
      padding: 8px 2px 6px;
    }

    .composer-btn {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: #f3f5f7;
      color: var(--ink);
      font-size: 20px;
    }

    .composer-btn.primary {
      background: var(--brand);
      color: #fff;
    }

    .section-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .settings-card {
      padding: 16px;
      border-radius: 20px;
      display: grid;
      gap: 12px;
    }

    .settings-card h3, .settings-card p {
      margin: 0;
    }

    .settings-card p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .settings-menu {
      display: grid;
      gap: 12px;
    }

    .settings-menu-item {
      width: 100%;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(249,248,244,0.96));
      box-shadow: 0 12px 28px rgba(52, 63, 73, 0.07);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      text-align: left;
      cursor: pointer;
      font: inherit;
      color: var(--ink);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .settings-menu-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(52, 63, 73, 0.09);
      border-color: rgba(20, 106, 144, 0.16);
    }

    .settings-menu-main {
      display: grid;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .settings-menu-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .settings-menu-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .settings-menu-item strong {
      display: block;
      font-size: 16px;
      line-height: 1.3;
    }

    .settings-menu-item span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .settings-menu-item em {
      font-style: normal;
      color: var(--brand);
      font-size: 20px;
      line-height: 1;
      padding-top: 4px;
      margin-left: 8px;
    }

    .usage-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .usage-box {
      padding: 13px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(20, 106, 144, 0.07);
    }

    .usage-box strong {
      display: block;
      font-size: 22px;
      margin-top: 6px;
    }

    .channel-list, .skill-list {
      display: grid;
      gap: 10px;
    }

    .channel-item, .skill-item {
      padding: 13px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .channel-item strong, .skill-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .skill-list {
      gap: 12px;
    }

    .skill-item {
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,247,243,0.96));
      border: 1px solid rgba(32, 38, 45, 0.06);
      box-shadow: 0 10px 24px rgba(52, 63, 73, 0.05);
      align-items: center;
    }

    .skill-item-main {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .skill-icon {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(20, 106, 144, 0.08);
      color: var(--brand);
      font-size: 16px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .skill-copy {
      min-width: 0;
    }

    .skill-copy strong {
      margin-bottom: 6px;
      font-size: 15px;
      line-height: 1.35;
    }

    .skill-copy .muted {
      font-size: 12px;
      line-height: 1.55;
    }

    .memory-form {
      display: grid;
      gap: 10px;
    }

    .memory-field {
      padding: 13px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(20, 106, 144, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .memory-field strong {
      display: block;
      margin-bottom: 4px;
    }

    .sidebar-header {
      display: grid;
      gap: 12px;
    }

    .profile {
      padding: 14px;
      border-radius: 20px;
      background: #fff;
      border: 1px solid rgba(32, 38, 45, 0.06);
    }

    .profile-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .mini-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 24px;
      background: linear-gradient(180deg, #38bdf8, #0ea5b7);
      color: #fff;
    }

    .sidebar-body {
      overflow: auto;
      display: grid;
      gap: 12px;
      padding-right: 4px;
    }

    .sidebar-card {
      padding: 14px;
      border-radius: 18px;
    }

    .sidebar-card h3 {
      margin: 0 0 6px;
      font-size: 15px;
    }

    .sidebar-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .metric-list {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .metric {
      padding: 7px 10px;
      border-radius: 12px;
      font-size: 12px;
      background: rgba(20, 106, 144, 0.07);
    }

    .history-list, .task-list, .template-list, .market-grid {
      display: grid;
      gap: 10px;
    }

    .history-item, .task-item, .template-item {
      padding: 12px;
      border-radius: 16px;
    }

    .history-item strong, .task-item strong, .template-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .history-head {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }

    .history-title {
      font-size: 15px;
      font-weight: 700;
      margin: 0;
    }

    .history-search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 0 0 12px;
      border-top: 1px solid rgba(32, 38, 45, 0.06);
      min-height: 42px;
    }

    .history-search-icon {
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
    }

    .history-card {
      width: 100%;
      padding: 14px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 26px rgba(52, 63, 73, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      text-align: left;
      cursor: pointer;
      font: inherit;
      color: inherit;
    }

    .history-card-title {
      margin: 0 0 6px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
    }

    .history-card-time {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .history-menu {
      position: relative;
      flex: 0 0 auto;
    }

    .history-menu-btn {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      border: 0;
      background: rgba(32, 38, 45, 0.05);
      color: var(--muted);
      font: inherit;
      cursor: pointer;
    }

    .history-menu-list {
      position: absolute;
      top: 36px;
      right: 0;
      min-width: 96px;
      padding: 6px;
      border-radius: 14px;
      border"
